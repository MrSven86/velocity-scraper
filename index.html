<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velocity Scraper</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; padding: 40px 20px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #666; margin-bottom: 28px; }
  .mode-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #e0e0e0; background: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: #666; }
  .mode-btn.active { border-color: #1a1a1a; color: #1a1a1a; background: #fff; }
  .mode-btn .icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #e8e8e8; }
  label { font-size: 13px; font-weight: 500; color: #444; display: block; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafafa; outline: none; margin-bottom: 16px; }
  input:focus, select:focus { border-color: #999; background: #fff; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #333; }
  .btn:disabled { background: #999; cursor: not-allowed; }
  .btn-outline { background: #fff; color: #1a1a1a; border: 1px solid #ddd; font-weight: 500; font-size: 13px; padding: 10px; }
  .btn-outline:hover { background: #f5f5f5; }
  .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .status.info { background: #e8f0fe; color: #1a56db; }
  .status.success { background: #e3fae8; color: #166534; }
  .status.error { background: #fde8e8; color: #c0392b; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: #f5f5f0; border-radius: 8px; padding: 14px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-label { font-size: 12px; color: #666; margin-top: 2px; }
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #eee; margin-bottom: 16px; }
  .tab { padding: 8px 18px; font-size: 13px; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; color: #666; font-weight: 500; }
  .tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .review { border: 1px solid #eee; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
  .rev-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .rev-name { font-weight: 600; font-size: 14px; }
  .rev-stars { color: #f59e0b; }
  .rev-text { font-size: 13px; color: #444; line-height: 1.6; }
  .rev-date { font-size: 12px; color: #999; margin-top: 6px; }
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .photo-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; }
  .photo-grid img:hover { opacity: 0.85; }
  .ig-post { border: 1px solid #eee; border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .ig-post img, .ig-post video { width: 100%; max-height: 400px; object-fit: cover; display: block; }
  .ig-post-body { padding: 12px; }
  .ig-caption { font-size: 13px; color: #333; line-height: 1.6; white-space: pre-wrap; }
  .ig-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #999; }
  .ig-type { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #f0f0f0; color: #555; margin-bottom: 8px; }
  .dl-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
  .hidden { display: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress { height: 4px; background: #eee; border-radius: 2px; margin: 8px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: #1a56db; border-radius: 2px; transition: width 0.4s; }
  .tip { font-size: 12px; color: #888; background: #f9f9f5; border-radius: 6px; padding: 8px 12px; margin-bottom: 16px; line-height: 1.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Velocity Scraper</h1>
  <p class="sub">Pull reviews, photos and captions from Google Maps and Instagram</p>

  <div class="card" id="setup-card">
    <div class="mode-tabs">
      <button class="mode-btn active" id="mode-gmaps" onclick="setMode('gmaps')">
        <span class="icon">🗺️</span>Google Maps
      </button>
      <button class="mode-btn" id="mode-ig" onclick="setMode('ig')">
        <span class="icon">📸</span>Instagram
      </button>
    </div>

    <label>Apify API token</label>
    <input type="password" id="token" placeholder="apify_api_xxxx..." />

    <div id="gmaps-fields">
      <label>Google Maps URL or business name</label>
      <input type="text" id="gmaps-query" placeholder="https://maps.google.com/... or La pelu Belgrano Buenos Aires" />
      <div class="row">
        <div>
          <label>Max reviews</label>
          <select id="maxReviews">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="200">200</option>
          </select>
        </div>
        <div>
          <label>Max photos</label>
          <select id="maxPhotos">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
    </div>

    <div id="ig-fields" class="hidden">
      <div class="tip">Paste the Instagram profile URL. Example: https://www.instagram.com/lapelu.belgrano/</div>
      <label>Instagram profile URL</label>
      <input type="text" id="ig-query" placeholder="https://www.instagram.com/username/" />
      <label>Max posts to scrape</label>
      <select id="maxPosts">
        <option value="12">12 posts</option>
        <option value="24">24 posts</option>
        <option value="50" selected>50 posts</option>
        <option value="100">100 posts</option>
      </select>
    </div>

    <div id="status" class="status info hidden"></div>
    <div class="progress hidden" id="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

    <button class="btn" id="run-btn" onclick="startScrape()">Start scraping</button>
  </div>

  <div class="card hidden" id="results-card">
    <div class="stats" id="stats"></div>
    <div class="tabs" id="result-tabs"></div>
    <div id="pane-reviews"></div>
    <div id="pane-photos" class="hidden"></div>
    <div id="pane-posts" class="hidden"></div>
    <div id="pane-captions" class="hidden"></div>
    <div class="dl-btns" id="dl-btns"></div>
    <button class="btn btn-outline" style="margin-top:8px;width:100%;" onclick="reset()">Scrape another</button>
  </div>
</div>

<script>
let data = null;
let currentMode = 'gmaps';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('gmaps-fields').classList.toggle('hidden', mode !== 'gmaps');
  document.getElementById('ig-fields').classList.toggle('hidden', mode !== 'ig');
  document.getElementById('mode-gmaps').classList.toggle('active', mode === 'gmaps');
  document.getElementById('mode-ig').classList.toggle('active', mode === 'ig');
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
  el.classList.remove('hidden');
}

function setProgress(pct) {
  document.getElementById('progress-wrap').classList.remove('hidden');
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function startScrape() {
  const token = document.getElementById('token').value.trim();
  if (!token) { setStatus('Please enter your Apify API token', 'error'); return; }

  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Starting...';
  setProgress(5);

  try {
    if (currentMode === 'gmaps') {
      await scrapeGmaps(token);
    } else {
      await scrapeInstagram(token);
    }
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Start scraping';
  }
}

async function scrapeGmaps(token) {
  const query = document.getElementById('gmaps-query').value.trim();
  if (!query) { throw new Error('Please enter a Google Maps URL or business name'); }

  const maxReviews = parseInt(document.getElementById('maxReviews').value);
  const maxPhotos = parseInt(document.getElementById('maxPhotos').value);
  const isUrl = query.startsWith('http');

  setStatus('Starting Google Maps scraper... 1–3 minutes', 'info');

  const input = {
    startUrls: isUrl ? [{ url: query }] : [],
    searchStringsArray: isUrl ? [] : [query],
    maxReviews,
    maxImages: maxPhotos,
    reviewsSort: 'newest',
    language: 'en',
    scrapeReviewerInfo: true,
  };

  const runId = await startActor(token, 'compass~crawler-google-places', input);
  const result = await pollRun(token, runId);
  data = { mode: 'gmaps', place: result[0] };
  renderGmaps(result[0]);
}

async function scrapeInstagram(token) {
  const query = document.getElementById('ig-query').value.trim();
  if (!query) { throw new Error('Please enter an Instagram profile URL'); }
  const maxPosts = parseInt(document.getElementById('maxPosts').value);

  setStatus('Starting Instagram scraper... 1–4 minutes', 'info');

  const username = query.replace('https://www.instagram.com/', '').replace('http://www.instagram.com/', '').replace(/\/$/, '').replace('@', '');

  const input = {
    username: [username],
    resultsLimit: maxPosts,
  };

  const runId = await startActor(token, 'apify~instagram-post-scraper', input);
  const result = await pollRun(token, runId);
  data = { mode: 'ig', posts: result };
  renderInstagram(result);
}

async function startActor(token, actorId, input) {
  const resp = await fetch(`https://api.apify.com/v2/acts/${actorId}/runs?token=${token}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(input)
  });
  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || 'Could not start actor. Check your token.');
  }
  const j = await resp.json();
  return j.data.id;
}

async function pollRun(token, runId) {
  const btn = document.getElementById('run-btn');
  let attempts = 0;

  while (attempts < 80) {
    await sleep(5000);
    attempts++;
    setProgress(Math.min(15 + attempts * 1.0, 85));

    const r = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${token}`);
    const j = await r.json();
    const status = j.data.status;

    if (status === 'SUCCEEDED') {
      setProgress(95);
      setStatus('Done! Loading results...', 'success');
      const datasetId = j.data.defaultDatasetId;
      const itemsR = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=100`);
      const items = await itemsR.json();
      if (!items || items.length === 0) throw new Error('No results found. Try a different URL.');
      setProgress(100);
      return items;
    }

    if (['FAILED','ABORTED','TIMED-OUT'].includes(status)) {
      throw new Error('Actor run ' + status.toLowerCase() + '. Check Apify console.');
    }

    btn.innerHTML = `<span class="spinner"></span>${attempts * 5}s...`;
    setStatus(`Still running... (${attempts * 5}s)`, 'info');
  }
  throw new Error('Timed out. Check your Apify console.');
}

function renderGmaps(place) {
  document.getElementById('setup-card').classList.add('hidden');
  document.getElementById('results-card').classList.remove('hidden');

  const reviews = place.reviews || [];
  const photos = place.imageUrls || place.images || [];
  const rating = parseFloat(place.totalScore || place.rating || 0).toFixed(1);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${rating}</div><div class="stat-label">avg rating</div></div>
    <div class="stat"><div class="stat-num">${place.reviewsCount || reviews.length}</div><div class="stat-label">reviews</div></div>
    <div class="stat"><div class="stat-num">${photos.length}</div><div class="stat-label">photos</div></div>
  `;

  document.getElementById('result-tabs').innerHTML = `
    <button class="tab active" onclick="switchTab('reviews',this)">Reviews (${reviews.length})</button>
    <button class="tab" onclick="switchTab('photos',this)">Photos (${photos.length})</button>
  `;

  document.getElementById('pane-reviews').innerHTML = reviews.length === 0
    ? '<p style="color:#999;font-size:13px">No reviews returned.</p>'
    : reviews.map(r => `
      <div class="review">
        <div class="rev-header">
          <span class="rev-name">${r.name || 'Anonymous'}</span>
          <span class="rev-stars">${'★'.repeat(r.stars||0)}${'☆'.repeat(5-(r.stars||0))}</span>
        </div>
        <div class="rev-text">${r.text || r.reviewOriginText || '(no text)'}</div>
        <div class="rev-date">${r.publishedAtDate ? new Date(r.publishedAtDate).toLocaleDateString() : ''}</div>
      </div>`).join('');

  document.getElementById('pane-photos').innerHTML = photos.length === 0
    ? '<p style="color:#999;font-size:13px">No photos found.</p>'
    : `<div class="photo-grid">${photos.map((url,i) =>
        `<img src="${url}" alt="${i+1}" onclick="window.open('${url}','_blank')" onerror="this.style.display='none'" />`
      ).join('')}</div>`;

  document.getElementById('dl-btns').innerHTML = `
    <button class="btn btn-outline" onclick="dlJSON()">Download JSON</button>
    <button class="btn btn-outline" onclick="dlCSV()">Reviews CSV</button>
    <button class="btn btn-outline" onclick="dlPhotos()">Save all photos</button>
  `;
}

function renderInstagram(posts) {
  document.getElementById('setup-card').classList.add('hidden');
  document.getElementById('results-card').classList.remove('hidden');

  const photos = posts.filter(p => p.type === 'Image' || !p.type);
  const videos = posts.filter(p => p.type === 'Video');
  const withCaption = posts.filter(p => p.caption && p.caption.trim().length > 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-num">${posts.length}</div><div class="stat-label">posts</div></div>
    <div class="stat"><div class="stat-num">${withCaption.length}</div><div class="stat-label">with captions</div></div>
    <div class="stat"><div class="stat-num">${videos.length}</div><div class="stat-label">videos</div></div>
  `;

  document.getElementById('result-tabs').innerHTML = `
    <button class="tab active" onclick="switchTab('posts',this)">Posts</button>
    <button class="tab" onclick="switchTab('captions',this)">Captions only</button>
  `;

  document.getElementById('pane-posts').innerHTML = posts.map(p => {
    const mediaUrl = p.displayUrl || p.thumbnailUrl || '';
    const isVideo = p.type === 'Video';
    const media = isVideo
      ? `<video src="${p.videoUrl || mediaUrl}" controls poster="${mediaUrl}" style="width:100%;max-height:400px;"></video>`
      : `<img src="${mediaUrl}" alt="post" onclick="window.open('${mediaUrl}','_blank')" />`;
    const likes = p.likesCount || 0;
    const comments = p.commentsCount || 0;
    const date = p.timestamp ? new Date(p.timestamp).toLocaleDateString() : '';
    return `<div class="ig-post">
      ${media}
      <div class="ig-post-body">
        <span class="ig-type">${isVideo ? 'Video' : 'Photo'}</span>
        <div class="ig-caption">${p.caption || '(no caption)'}</div>
        <div class="ig-meta">
          <span>♥ ${likes}</span>
          <span>💬 ${comments}</span>
          <span>${date}</span>
          ${p.url ? `<a href="${p.url}" target="_blank" style="color:#1a56db">View on Instagram</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pane-captions').innerHTML = `
    <div style="margin-bottom:10px;">
      <button class="btn btn-outline" style="width:auto;padding:8px 16px;" onclick="dlCaptions()">Download all captions as .txt</button>
    </div>
    ${withCaption.map((p,i) => `
      <div style="border:1px solid #eee;border-radius:8px;padding:14px;margin-bottom:10px;">
        <div style="font-size:12px;color:#999;margin-bottom:6px;">Post ${i+1} — ${p.timestamp ? new Date(p.timestamp).toLocaleDateString() : ''}</div>
        <div style="font-size:13px;color:#333;line-height:1.7;white-space:pre-wrap;">${p.caption}</div>
      </div>`).join('')}
  `;

  document.getElementById('dl-btns').innerHTML = `
    <button class="btn btn-outline" onclick="dlJSON()">Download JSON</button>
    <button class="btn btn-outline" onclick="dlCaptions()">Captions .txt</button>
    <button class="btn btn-outline" onclick="dlIgPhotos()">Save all photos</button>
  `;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['reviews','photos','posts','captions'].forEach(p => {
    document.getElementById('pane-' + p).classList.toggle('hidden', p !== name);
  });
}

function dlJSON() {
  if (!data) return;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  triggerDownload(blob, 'scraped-data.json');
}

function dlCSV() {
  if (!data || data.mode !== 'gmaps') return;
  const reviews = data.place.reviews || [];
  const rows = [['Name','Stars','Text','Date','Likes']];
  reviews.forEach(r => rows.push([
    `"${(r.name||'').replace(/"/g,'')}"`,
    r.stars||0,
    `"${(r.text||r.reviewOriginText||'').replace(/"/g,'').replace(/\n/g,' ')}"`,
    r.publishedAtDate||'',
    r.likesCount||0
  ]));
  triggerDownload(new Blob([rows.map(r=>r.join(',')).join('\n')], {type:'text/csv'}), 'reviews.csv');
}

function dlCaptions() {
  if (!data || data.mode !== 'ig') return;
  const lines = data.posts
    .filter(p => p.caption)
    .map((p,i) => `--- Post ${i+1} (${p.timestamp ? new Date(p.timestamp).toLocaleDateString() : ''}) ---\n${p.caption}\n`)
    .join('\n');
  triggerDownload(new Blob([lines], {type:'text/plain'}), 'instagram-captions.txt');
}

async function dlPhotos() {
  if (!data || data.mode !== 'gmaps') return;
  const photos = data.place.imageUrls || data.place.images || [];
  if (!photos.length) { alert('No photos found.'); return; }
  for (let i = 0; i < photos.length; i++) {
    try {
      const resp = await fetch(photos[i]);
      const blob = await resp.blob();
      const ext = blob.type.includes('png') ? 'png' : 'jpg';
      triggerDownload(blob, `gmaps-photo-${String(i+1).padStart(2,'0')}.${ext}`);
      await sleep(400);
    } catch(e) { console.warn('photo', i+1, e); }
  }
}

async function proxyFetch(url) {
  const resp = await fetch('/api/proxy?url=' + encodeURIComponent(url));
  if (!resp.ok) throw new Error('proxy failed ' + resp.status);
  return await resp.blob();
}

async function dlIgPhotos() {
  if (!data || data.mode !== 'ig') return;
  const allMedia = data.posts.filter(p => p.displayUrl || p.videoUrl);
  if (!allMedia.length) { alert('No media found.'); return; }
  let saved = 0;
  for (let i = 0; i < allMedia.length; i++) {
    const post = allMedia[i];
    const isVideo = post.type === 'Video';
    const url = isVideo ? (post.videoUrl || post.displayUrl) : post.displayUrl;
    if (!url) continue;
    try {
      const blob = await proxyFetch(url);
      const ext = isVideo ? 'mp4' : (blob.type.includes('png') ? 'png' : 'jpg');
      triggerDownload(blob, `ig-${String(i+1).padStart(2,'0')}.${ext}`);
      saved++;
      await sleep(600);
    } catch(e) { console.warn('media error', i+1, e); }
  }
  alert('Done! Downloaded ' + saved + ' of ' + allMedia.length + ' files.');
}

function triggerDownload(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

function reset() {
  data = null;
  document.getElementById('setup-card').classList.remove('hidden');
  document.getElementById('results-card').classList.add('hidden');
  document.getElementById('status').classList.add('hidden');
  document.getElementById('progress-wrap').classList.add('hidden');
  const btn = document.getElementById('run-btn');
  btn.disabled = false;
  btn.innerHTML = 'Start scraping';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
